name: Refresh Article Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0,12 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh article catalog json
        env:
          LARK_API_BASE_URL: ${{ secrets.LARK_API_BASE_URL }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_SOURCE_TYPE: bitable
          LARK_BASE_APP_TOKEN: ${{ secrets.LARK_BASE_APP_TOKEN }}
          LARK_BASE_TABLE_ID: ${{ secrets.LARK_BASE_TABLE_ID }}
          LARK_BASE_ARTICLE_NR_FIELD_ID: ${{ secrets.LARK_BASE_ARTICLE_NR_FIELD_ID }}
          LARK_BASE_ARTICLE_NAME_FIELD_ID: ${{ secrets.LARK_BASE_ARTICLE_NAME_FIELD_ID }}
        run: python refresh_article_catalog_json.py

      - name: Commit updated article catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/article_catalog.json
          git diff --cached --quiet && exit 0
          git commit -m "Refresh article catalog"
          git push
